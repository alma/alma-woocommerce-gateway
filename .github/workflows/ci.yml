name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
      - feature/6.0
  pull_request:
    branches:
      - main
      - develop
      - feature/6.0
  workflow_dispatch: ~

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Install taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611

      - name: Lint code
        run: task lint

  test:
    name: Run tests
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      # We are using only the latest supported version as a first step
      matrix:
        include:
          - php_version: "7.4"

    env:
      PHP_VERSION: ${{ matrix.php_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          show-progress: false

      - name: Install taskfile
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0

      - name: Run tests
        run: task ${{ matrix.php_version }}:tests