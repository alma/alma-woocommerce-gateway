name: Create a pull request to update readme files indicating CMS compatibility

on:
    workflow_dispatch:
        inputs:
            cms-version:
                description: 'New tested CMS version'
                required: true
            wp-version:
                description: 'New tested WordPress version'
                required: true

jobs:
  create-pull-request:
    name: Create Pull Request
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Update CMS compatibility in README files
        run: ./bin/update-cms-compatibility.sh "${{ github.event.inputs.cms-version }}" "${{ github.event.inputs.wp-version }}"

        # If using default Github token, the created pull request won't trigger workflows with pull_request event
        # See https://github.com/peter-evans/create-pull-request/blob/main/docs/concepts-guidelines.md#triggering-further-workflow-runs
      - name: Generate Github token to create PR
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.1
        id: github-token
        with:
            app-id: ${{ secrets.ALMA_CREATE_TEAM_PRS_APP_ID }}
            private-key: ${{ secrets.ALMA_CREATE_TEAM_PRS_APP_PEM }}
            repositories: alma-woocommerce-gateway

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
            token: ${{ steps.github-token.outputs.token }}
            commit-message: 'chore: update CMS compatibility to WP ${{ github.event.inputs.wp-version }}, WC ${{ github.event.inputs.cms-version }}'
            title: Update CMS compatibility to WP ${{ github.event.inputs.wp-version }}, WC ${{ github.event.inputs.cms-version }}
            body: |
              This PR updates the README files to indicate compatibility with WordPress version ${{ github.event.inputs.wp-version }} and WooCommerce version ${{ github.event.inputs.cms-version }}.

              Please review the changes and merge if everything looks good.
            branch: chore/update-cms-compatibility-to-wp-${{ github.event.inputs.wp-version }}-wc-${{ github.event.inputs.cms-version }}
            base: develop
            labels: skip-changelog
